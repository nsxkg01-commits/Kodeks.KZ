<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конституция РК</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h2>📜 Поиск статьи</h2>

<input type="number" id="article" placeholder="Введите номер статьи">
<button onclick="findArticle()">Найти</button>

<p id="result"></p>

<script>
    function findArticle() {
        let num = document.getElementById("article").value;
        let result = document.getElementById("result");

        if (num == 1) {
            result.innerText = "Статья 1: Республика Казахстан утверждает себя демократическим государством...";
        } else {
            result.innerText = "Статья не найдена";
        }
    }

    let tg = window.Telegram.WebApp;
    tg.expand();
</script>

</body>
</html>

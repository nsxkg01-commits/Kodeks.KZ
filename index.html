<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конституционный портал РК</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <header>
        <h1>Конституционный портал Республики Казахстан</h1>
    </header>

    <nav class="menu">
        <button onclick="showAll()">📂 Полный свод норм</button>
        <button onclick="showUpdated()">🔄 Актуализированные положения</button>
        <button onclick="showNew()">✨ Новые положения</button>
        <button onclick="showRights()">⚖️ Основные права</button>
        <button onclick="showCitizens()">👥 Все права граждан</button>
        <button onclick="showStudents()">🎓 Права обучающихся</button>
        <button onclick="showGov()">👔 Госслужащие</button>
    </nav>

    <main id="content"></main>

    <button id="toTop" onclick="scrollTopNow()">↑</button>

    <script src="main"></script>
    
    <script>
        window.onscroll = function() {
            const btn = document.getElementById("toTop");
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        };

        function scrollTopNow() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
